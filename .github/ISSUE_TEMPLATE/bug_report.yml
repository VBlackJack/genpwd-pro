name: 🐛 Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: What should have happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: GenPwd Pro Version
      description: What version are you using? (check footer or package.json)
      placeholder: "2.6.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Where are you running GenPwd Pro?
      options:
        - Web (browser)
        - Windows (Electron)
        - macOS (Electron)
        - Linux (Electron)
        - Android
        - Browser Extension (Chrome)
        - Browser Extension (Firefox)
      multiple: true
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser/OS Version
      description: If web/extension, which browser and version?
      placeholder: "Chrome 120.0, Windows 11"

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Paste any error messages from the browser console (F12)
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or information
